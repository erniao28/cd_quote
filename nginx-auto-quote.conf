# auto-quote 项目 Nginx 配置
# 独立 server 块配置 - 与一级报价系统共用 80 端口

server {
    listen 80;
    server_name 121.40.35.46;

    # 前端静态文件
    location /auto-quote {
        alias /root/auto-quote/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /auto-quote/index.html;
    }

    # 后端 API 代理
    location /auto-quote-api {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket 代理（如后续需要 Socket.io）
    location /auto-quote-api/socket.io {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
